<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      body {
        font-family: "Geist", sans-serif;
        background-color: #f9fafb;
      }
    </style>
  </head>

  <body>
    <section id="login-page" class="w-full flex justify-center">
      <div
        class="card w-full max-w-[380px] bg-white shadow-2xl px-10 mt-10 rounded-2xl border border-gray-100"
      >
        <div class="text-center mb-8">
          <div class="flex justify-center mb-4">
            <img
              src="./github-logo.png"
              alt="GitHub Logo"
              class="w-25 h-25 object-contain pt-1"
            />
          </div>
          <h2 class="text-xl font-semibold text-gray-800 mb-1">
            GitHub Issues Tracker
          </h2>
          <p class="text-gray-600 text-sm">Sign in to manage your issues</p>
        </div>

        <div class="space-y-5">
          <div class="form-control w-full">
            <label class="label">
              <span class="label-text font-bold text-gray-600">Username</span>
            </label>
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"
              >
              </span>
              <input
                type="text"
                id="username"
                placeholder="Enter Username"
                class="input input-bordered w-full focus:outline-primary border-gray-400"
              />
            </div>
          </div>

          <div class="form-control w-full">
            <label class="label pt-0">
              <span class="label-text font-bold text-gray-600">Password</span>
            </label>
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 flex items-center text-gray-500"
              >
              </span>
              <input
                type="password"
                id="password"
                placeholder="Enter Password"
                class="input input-bordered w-full focus:outline-primary border-gray-400"
              />
            </div>
          </div>

          <div class="pt-2">
            <button
              onclick="handleLogin()"
              class="btn btn-primary w-full text-white text-lg"
            >
              Sign In
            </button>
          </div>
        </div>
        <br />
        <div class="flex justify-center items-center w-full text-gray-400">
          <hr class="w-[42%]" />
          <h1>OR</h1>
          <hr class="w-[42%]" />
        </div>
        <h3
          class="flex justify-center text-xs font-semibold text-gray-500 mt-5"
        >
          Demo Credentials:
        </h3>
        <div class="mt-4 mb-4 p-4 bg-gray-50 rounded-xl border border-gray-100">
          <div class="flex flex-col text-center justify-center text-xs">
            <p>
              <span class="font-bold">Username: </span>
              <span class="text-gray-600">admin</span>
            </p>
            <p>
              <span class="font-bold">Pass: </span>
              <span class="">admin123</span>
            </p>
          </div>
        </div>
      </div>
    </section>

    <section id="main-page" class=" hidden min-h-screen">
      <nav class="bg-white p-4 shadow-sm sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
          <div class="flex items-center gap-3">
            <img class="w-10 h-10" src="github-logo.png" alt="Logo" />
            <span class="text-lg font-bold text-gray-800 hidden md:block"
              >GitHub Issues Tracker</span
            >
          </div>

          <div class="flex gap-2">
            <input
              type="text"
              id="search-input"
              oninput="handleSearch()"
              placeholder="Search issues..."
              class="input input-sm input-bordered bg-gray-50 w-40 md:w-64 focus:outline-primary-purple"
            />
            <button
              class="btn btn-sm bg-[#4a00ff] border-none text-white px-4"
            >
              + New Issue
            </button>
          </div>
        </div>
      </nav>

      <div class="container mx-auto p-6 pb-0">
        <div
          class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-6"
        >
          <div class="flex gap-3">
            <button
              id="tab-all"
              onclick="filterIssues('all')"
              class="px-8 py-2 rounded-lg font-bold transition-all bg-primary-purple text-white"
            >
              All
            </button>
            <button
              id="tab-open"
              onclick="filterIssues('open')"
              class="px-8 py-2 rounded-lg font-bold transition-all bg-white text-gray-500 border border-gray-200 hover:bg-gray-50"
            >
              Open
            </button>
            <button
              id="tab-closed"
              onclick="filterIssues('closed')"
              class="px-8 py-2 rounded-lg font-bold transition-all bg-white text-gray-500 border border-gray-200 hover:bg-gray-50"
            >
              Closed
            </button>
          </div>
        </div>

        <div
          class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4 mb-6"
        >
          <div class="flex items-center gap-4">
            <div
              class="w-14 h-14 bg-indigo-50 rounded-full flex items-center justify-center"
            >
              <img class="h-10 w-10" src="Aperture.png" alt="" />
            </div>
            <div>
              <h2 id="total-count" class="text-2xl font-bold text-gray-800">
                0 Issues
              </h2>
              <p class="text-gray-400 text-sm">
                Track and manage your project issues
              </p>
            </div>
          </div>

          <div class="flex items-center gap-8 text-sm font-bold">
            <div class="flex items-center gap-2">
              <span class="w-3 h-3 rounded-full bg-[#00ba71]"></span>
              <span id="open-count" class="text-gray-600">0 Open</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="w-3 h-3 rounded-full bg-purple-500"></span>
              <span id="closed-count" class="text-gray-600">0 Closed</span>
            </div>
          </div>
        </div>
      </div>

      <main class="container mx-auto p-6">
        <div
          id="issues-container"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"
        >
          <p class="text-center col-span-full py-20 text-gray-400">
            Loading issues...
          </p>
        </div>
      </main>
    </section>

    <dialog id="issue_modal" class="modal">
      <div class="modal-box max-w-3xl p-0 overflow-hidden rounded-3xl bg-white">
        <div id="modal-content" class="p-10"></div>
        <div class="p-6 bg-gray-50 flex justify-end">
          <form method="dialog">
            <button
              class="btn bg-primary-purple bg-[#4a00ff] text-white px-10 rounded-xl border-none font-bold"
            >
              Close
            </button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
